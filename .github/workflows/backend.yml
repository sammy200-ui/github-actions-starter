name: Backend Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x,19.x,18.x]
    defaults:
      run:
        working-directory: ./backend
    steps:
        - name: checkout code
          uses: actions/checkout@v4
        - name: setup node
          uses: actions/setup-node@v4
          with:
            node-version: ${{ matrix.node-version }}
        - name: install dependencies
          run: npm ci
        - name: run tests
          run: npm test
   

